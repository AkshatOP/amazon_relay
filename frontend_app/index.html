<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Amazon Relay</title>

<!-- Fonts + icons (matches Stitch exports) -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<!-- Leaflet (only used by the map screen) -->
<link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Tailwind + ONE canonical config (consolidated from the 5 Stitch exports) -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: { extend: {
      colors: {
        "background":"#f7faf8","surface":"#f7faf8","surface-bright":"#f7faf8",
        "surface-container-lowest":"#ffffff","surface-container-low":"#f1f4f2",
        "surface-container":"#ebefec","surface-container-high":"#e6e9e7","surface-container-highest":"#e0e3e1",
        "surface-variant":"#e0e3e1","surface-dim":"#d7dbd9","surface-tint":"#066a5f",
        "primary":"#00544a","primary-container":"#0f6e62","on-primary":"#ffffff","on-primary-container":"#9cedde",
        "primary-fixed":"#a0f2e2","primary-fixed-dim":"#85d5c6","on-primary-fixed":"#00201c","on-primary-fixed-variant":"#005047",
        "secondary":"#4f6070","secondary-container":"#d0e2f4","on-secondary":"#ffffff","on-secondary-container":"#546474",
        "secondary-fixed":"#d3e5f7","secondary-fixed-dim":"#b7c9db","on-secondary-fixed":"#0b1d2b","on-secondary-fixed-variant":"#384958",
        "tertiary":"#753924","tertiary-container":"#925039","on-tertiary":"#ffffff","on-tertiary-container":"#ffd5c8",
        "tertiary-fixed":"#ffdbcf","tertiary-fixed-dim":"#ffb59c","on-tertiary-fixed":"#390c00","on-tertiary-fixed-variant":"#713621",
        "error":"#ba1a1a","error-container":"#ffdad6","on-error":"#ffffff","on-error-container":"#93000a",
        "on-surface":"#181c1b","on-surface-variant":"#3e4946","on-background":"#181c1b",
        "outline":"#6e7976","outline-variant":"#bec9c5",
        "inverse-surface":"#2d3130","inverse-on-surface":"#eef1ef","inverse-primary":"#85d5c6",
        "amber":"#FFA724","amber-action":"#FFA724","near-black":"#131A22","success":"#27AE60"
      },
      borderRadius: { DEFAULT:"0.25rem", lg:"0.5rem", xl:"0.75rem", full:"9999px" },
      spacing: { "stack-sm":"4px","stack-md":"8px","stack-lg":"16px","stack-xl":"24px","gutter":"12px","container-margin":"16px" },
      fontFamily: {
        "display-lg":["Inter"],"headline-md":["Inter"],"headline-sm":["Inter"],
        "body-lg":["Inter"],"body-md":["Inter"],"label-md":["Inter"],"label-bold":["Inter"],"mono-code":["JetBrains Mono"]
      },
      fontSize: {
        "display-lg":["32px",{lineHeight:"40px",letterSpacing:"-0.02em",fontWeight:"700"}],
        "headline-md":["20px",{lineHeight:"28px",fontWeight:"600"}],
        "headline-sm":["16px",{lineHeight:"24px",fontWeight:"600"}],
        "body-lg":["16px",{lineHeight:"24px",fontWeight:"400"}],
        "body-md":["14px",{lineHeight:"20px",fontWeight:"400"}],
        "label-md":["12px",{lineHeight:"16px",fontWeight:"500"}],
        "label-bold":["12px",{lineHeight:"16px",letterSpacing:"0.02em",fontWeight:"700"}],
        "mono-code":["12px",{lineHeight:"18px",fontWeight:"400"}]
      }
    } }
  }
</script>
<link href="css/app.css" rel="stylesheet"/>
</head>

<body class="bg-surface-container-low text-on-background antialiased min-h-screen flex justify-center">
<!-- Phone-width column centered on desktop -->
<div class="w-full max-w-[428px] min-h-screen bg-surface shadow-xl relative flex flex-col md:border-x border-outline-variant/40">

  <!-- TOP APP BAR -->
  <header class="h-[56px] flex-none flex items-center justify-between px-container-margin border-b border-outline-variant bg-surface sticky top-0 z-40">
    <button class="w-10 h-10 flex items-center justify-center text-primary rounded-full hover:bg-surface-container-high transition-colors" onclick="App.drawer.toggle()">
      <span class="material-symbols-outlined">menu</span>
    </button>
    <h1 class="font-headline-md text-headline-md font-semibold text-primary">Amazon Relay</h1>
    <div class="flex items-center gap-1">
      <div id="ai-pill" class="hidden bg-primary text-on-primary font-label-bold text-label-bold px-2.5 py-1 rounded-full animate-ai-pulse items-center gap-1 shadow-sm">
        <span class="material-symbols-outlined text-[14px] fill-icon">smart_toy</span><span>AI</span>
      </div>
      <button class="w-10 h-10 flex items-center justify-center text-primary rounded-full hover:bg-surface-container-high transition-colors">
        <span class="material-symbols-outlined">search</span>
      </button>
    </div>
  </header>

  <!-- NAV DRAWER -->
  <div id="drawer-overlay" class="fixed inset-0 bg-black/50 z-[55] hidden" onclick="App.drawer.toggle()"></div>
  <nav id="drawer" class="fixed inset-y-0 left-0 z-[60] w-[280px] bg-surface-container-lowest shadow-xl py-stack-lg transform -translate-x-full transition-transform duration-300 flex flex-col">
    <div class="px-4 mb-6"><h2 class="font-headline-sm text-headline-sm font-semibold text-primary">Amazon Relay</h2>
      <p class="font-label-md text-label-md text-on-surface-variant mt-1">Reverse logistics · resale</p></div>
    <ul class="flex flex-col gap-1" id="drawer-list"></ul>
    <div class="mt-auto px-4 pt-4 border-t border-outline-variant/40">
      <div id="health-chip" class="font-label-md text-label-md text-on-surface-variant flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-outline"></span><span>backend: checking…</span>
      </div>
    </div>
  </nav>

  <!-- SCREEN CONTAINER -->
  <main id="screen-host" class="flex-1 overflow-y-auto hide-scrollbar relative">

    <!-- 1. ORDER DETAIL -->
    <section id="screen-orders" class="screen p-container-margin pb-stack-xl gap-stack-lg"></section>

    <!-- 2. BRANCHED RETURN -->
    <section id="screen-return" class="screen p-container-margin pb-[100px] gap-stack-lg"></section>

    <!-- 3. RIDER PICKUP (HERO) -->
    <section id="screen-rider" class="screen p-container-margin pb-stack-xl gap-stack-lg bg-surface"></section>

    <!-- 4. LOGISTICS MAP -->
    <section id="screen-map" class="screen p-0 h-full"></section>

    <!-- 5. P2P NUDGE -->
    <section id="screen-p2p-nudge" class="screen p-container-margin pb-stack-xl gap-stack-lg relative"></section>

    <!-- 6. P2P GRADE + HEALTH CARD -->
    <section id="screen-p2p-grade" class="screen p-container-margin pb-stack-xl gap-stack-lg"></section>

    <!-- 7. P2P MATCH + HANDOFF -->
    <section id="screen-p2p-handoff" class="screen p-container-margin pb-stack-xl gap-stack-lg"></section>

    <!-- 8. HUB / DASHBOARD -->
    <section id="screen-hub" class="screen p-container-margin pb-stack-xl gap-stack-lg bg-surface"></section>
  </main>

  <!-- BOTTOM NAV -->
  <nav class="h-[64px] flex-none flex justify-around items-center border-t border-outline-variant bg-surface sticky bottom-0 z-40" id="bottom-nav"></nav>
</div>

<div id="toast-host"></div>

<!-- App scripts (classic, ordered; everything hangs off window.App) -->
<script src="js/api.js"></script>
<script src="js/state.js"></script>
<script src="js/screens/orders.js"></script>
<script src="js/screens/rider.js"></script>
<script src="js/screens/map.js"></script>
<script src="js/screens/p2p.js"></script>
<script src="js/screens/hub.js"></script>
<script src="js/router.js"></script>
</body>
</html>
